<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro - EcoHard</title>

    <link rel="stylesheet" href="cadastro.css">

</head>

<body>

    <div class="container">

        <div class="cadastro-card">

            <img src="/img/logo-ecohard.png" class="logo">

            <h2>Criar Conta</h2>

            <p>Preencha os dados abaixo.</p>

            <form onsubmit="cadastrar(event)">

                <div class="campo">

                    <label>Nome Completo</label>

                    <input
                        type="text"
                        id="nome"
                        placeholder="Digite seu nome"
                        required>

                </div>

                <div class="campo">

                    <label>E-mail</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Digite seu e-mail"
                        required>

                </div>

                <div class="campo">

                    <label>Senha</label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        required>

                </div>

                <div class="campo">

                    <label>Confirmar Senha</label>

                    <input
                        type="password"
                        id="confirmarSenha"
                        placeholder="Confirme sua senha"
                        required>

                </div>

                <button type="submit">

                    Cadastrar

                </button>

            </form>

            <p class="login">

                Já possui uma conta?

                <a href="/index.html">

                    Entrar

                </a>

            </p>

        </div>

    </div>

    <script src="cadastro.js"></script>

</body>

</html>
