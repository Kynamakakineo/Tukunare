<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoHard - Resgate</title>
    <link rel="stylesheet" href="resgate.css">
    <script src="/auth.js"></script>
    <script src="resgate.js" defer></script>
</head>
<body onload="verificarLogin()">

    <header class="navbar">
        <nav class="nav-container">
            <a href="/sobreNos/sobre.html">SOBRE NÓS</a>
            <a href="/contato/contato.html">CONTATO/SAC</a>
            <a href="/recicleAgora/recicleAgora.html">RECICLE AGORA</a>
            <a href="/resgate/resgate.html">RESGATE</a>
            <a href="/index.html" onclick="logout(); return false;">EXIT PEIXE</a>
        </nav>
    </header>

    <div class="main-wrapper">
        
        <aside class="sidebar">
            <div class="logo-box">
                <img src="/img/logo-ecohard.png" alt="EcoHard Logo" class="sidebar-logo">
            </div>
        </aside>

        <main class="content-panel">
            <div class="panel-header">
                <h1 class="page-title">RESGATE</h1>
                <h2>RESGATE SEU CUPOM:</h2>
                <p class="page-instructions">
                    Cada item doado gera um token que pode ser utilizado para resgatar cupons. 
                    Ele pode ser localizado no seu e-mail.
                </p>
            </div>
            
            <div class="coupon-container">
                <div class="input-group">
                    <label for="token-input">Digite seu cupom abaixo</label>
                    <input type="text" id="token-input" placeholder="Cole seu token aqui...">
                    <button id="btn-resgatar" class="btn-resgate">Resgatar</button>
            
        
                </div>
                    <div class="coupon-card" id="coupon-card" style="display:none;">
                    <div class="coupon-header">CUPOM</div>
                    <div class="coupon-body">
                        <div class="brand-logo"><img id="cupom-logo" src="" alt="Logo da empresa"></div>
                        <div class="coupon-details">
                            <h3 id="cupom-valor"></h3>
                            <h2 id="cupom-loja"></h2>
                        </div>
                    </div>
                    <div class="barcode-wrapper">
                        <div class="barcode"></div>
                        <span class="barcode-text" id="cupom-codigo"></span>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
